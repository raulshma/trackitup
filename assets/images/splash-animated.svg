<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#1E293B" />
    </linearGradient>
    
    <!-- Stroke Gradient -->
    <linearGradient id="strokeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#818CF8" />
    </linearGradient>

    <!-- Glowing Filter for neon-like effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="glow-intense" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bgGradient)" />

  <!-- Abstract geometric grid for tech/tracking vibe -->
  <g stroke="#334155" stroke-width="1" opacity="0.4">
    <path d="M 0 200 L 800 200 M 0 300 L 800 300 M 0 400 L 800 400 M 0 500 L 800 500 M 0 600 L 800 600" />
    <path d="M 200 0 L 200 800 M 300 0 L 300 800 M 400 0 L 400 800 M 500 0 L 500 800 M 600 0 L 600 800" />
  </g>

  <!-- Container for Animated Logo Path -->
  <g transform="translate(400, 360)">
    
    <!-- Base track line (ghost line) -->
    <path 
      d="M -140 100 L -60 100 L 0 20 L 60 120 L 140 -20" 
      fill="none" 
      stroke="#334155" 
      stroke-width="16" 
      stroke-linecap="round" 
      stroke-linejoin="round"
      opacity="0.5"
    />

    <!-- Animated main tracing line -->
    <path 
      d="M -140 100 L -60 100 L 0 20 L 60 120 L 140 -20" 
      fill="none" 
      stroke="url(#strokeGradient)" 
      stroke-width="16" 
      stroke-linecap="round" 
      stroke-linejoin="round"
      stroke-dasharray="600"
      stroke-dashoffset="600"
      filter="url(#glow)"
    >
      <animate 
        attributeName="stroke-dashoffset" 
        values="600;0" 
        dur="2s" 
        fill="freeze" 
        calcMode="spline" 
        keySplines="0.65 0 0.35 1" 
      />
    </path>
    
    <!-- Arrowhead at the end -->
    <path 
      d="M 90 -20 L 140 -20 L 140 30" 
      fill="none" 
      stroke="url(#strokeGradient)" 
      stroke-width="16" 
      stroke-linecap="round" 
      stroke-linejoin="round"
      opacity="0"
      filter="url(#glow)"
    >
      <animate 
        attributeName="opacity" 
        values="0;0;1" 
        keyTimes="0;0.9;1" 
        dur="2.2s" 
        fill="freeze" 
      />
      <animateTransform 
        attributeName="transform"
        type="translate"
        values="-20 20;0 0"
        begin="2s"
        dur="0.4s"
        fill="freeze"
        calcMode="spline"
        keySplines="0.34 1.56 0.64 1"
      />
    </path>

    <!-- Glowing dot that rides along the path -->
    <circle cx="-140" cy="100" r="10" fill="#FFFFFF" filter="url(#glow-intense)" opacity="0">
      <animate 
        attributeName="opacity" 
        values="1;1;0" 
        keyTimes="0;0.8;1" 
        dur="2.5s" 
        fill="freeze" 
      />
      <animateMotion 
        path="M -140 100 L -60 100 L 0 20 L 60 120 L 140 -20" 
        dur="2s" 
        fill="freeze" 
        calcMode="spline" 
        keySplines="0.65 0 0.35 1" 
      />
    </circle>
  </g>

  <!-- App Name Text -->
  <text 
    x="400" 
    y="560" 
    font-family="'Inter', 'Roboto', 'Outfit', sans-serif" 
    font-size="52" 
    font-weight="800" 
    fill="#FFFFFF" 
    text-anchor="middle"
    letter-spacing="6"
    opacity="0"
  >
    TRACK<tspan fill="#38BDF8">IT</tspan>UP
    <animate 
      attributeName="opacity" 
      values="0;0;1" 
      keyTimes="0;0.6;1" 
      dur="2.5s" 
      fill="freeze" 
    />
  </text>
  
  <!-- Subtitle Text -->
  <text 
    x="400" 
    y="600" 
    font-family="'Inter', 'Roboto', 'Outfit', sans-serif" 
    font-size="18" 
    font-weight="500" 
    fill="#94A3B8" 
    text-anchor="middle"
    letter-spacing="4"
    opacity="0"
  >
    MEASURE YOUR PROGRESS
    <animate 
      attributeName="opacity" 
      values="0;0;1" 
      keyTimes="0;0.8;1" 
      dur="3s" 
      fill="freeze" 
    />
  </text>
</svg>
