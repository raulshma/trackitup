name: TrackItUp APK Build Local

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metadata:
    name: Resolve release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.package_version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: package_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build:
    name: Build Android APK (${{ matrix.abi }}, Local)
    needs: metadata
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: production
    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: armeabi-v7a
            profile: production-armeabi-v7a
          - abi: arm64-v8a
            profile: production-arm64-v8a
          - abi: x86
            profile: production-x86
          - abi: x86_64
            profile: production-x86_64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate Clerk publishable key is configured for CI
        env:
          EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY }}
        run: |
          if [ -z "${EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY}" ]; then
            echo "Missing EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY GitHub secret."
            echo "Add it under Settings -> Secrets and variables -> Actions so local CI builds can inject the Expo public env var."
            exit 1
          fi

      - name: Build Android app locally for ${{ matrix.abi }}
        env:
          EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY }}
        run: |
          VERSION="${{ needs.metadata.outputs.version }}"
          OUTPUT_PATH="${{ github.workspace }}/TrackItUp-v${VERSION}-android-${{ matrix.abi }}.apk"
          eas build --platform android --profile ${{ matrix.profile }} --local --non-interactive --output "$OUTPUT_PATH"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: trackitup-apk-${{ matrix.abi }}
          path: ${{ github.workspace }}/TrackItUp-v${{ needs.metadata.outputs.version }}-android-${{ matrix.abi }}.apk

  release:
    name: Create GitHub Release
    needs:
      - metadata
      - build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download built APK artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: trackitup-apk-*
          path: ./release
          merge-multiple: true

      - name: Summarize APK assets
        id: release_notes
        run: |
          {
            echo 'body<<EOF'
            echo '🚀 **New Android build released (Local)**'
            echo
            echo '- **Version:** v${{ needs.metadata.outputs.version }}'
            echo '- **Commit:** ${{ github.sha }}'
            echo '- **Build:** Local EAS Build'
            echo '- **APK assets:**'
            for file in ./release/*.apk; do
              echo "  - $(basename "$file")"
            done
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release with APKs
        uses: softprops/action-gh-release@v2
        with:
          name: "TrackItUp v${{ needs.metadata.outputs.version }}"
          tag_name: "v${{ needs.metadata.outputs.version }}"
          body: ${{ steps.release_notes.outputs.body }}
          files: ./release/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.CUSTOM_GITHUB_TOKEN }}
