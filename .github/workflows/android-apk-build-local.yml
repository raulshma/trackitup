name: TrackItUp APK Build Local

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK (Local)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: production
    outputs:
      version: ${{ steps.package_version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Get version from package.json
        id: package_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build Android app locally
        run: eas build --platform android --profile preview --local --output ${{ github.workspace }}/app-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: ${{ github.workspace }}/app-release.apk

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download built APK artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release
          path: ./release

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          name: "TrackItUp v${{ needs.build.outputs.version }}"
          tag_name: "v${{ needs.build.outputs.version }}"
          body: |
            🚀 **New Android build released (Local)**

            - **Version:** v${{ needs.build.outputs.version }}
            - **Commit:** ${{ github.sha }}
            - **Build:** Local EAS Build
          files: ./release/app-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.CUSTOM_GITHUB_TOKEN }}
