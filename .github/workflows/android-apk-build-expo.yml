name: TrackItUp APK Build & Release

on:
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production
    outputs:
      version: ${{ steps.package_version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Get version from package.json
        id: package_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build Android app on EAS Cloud
        run: |
          eas build \
            --platform android \
            --profile production \
            --non-interactive \
            --wait \
            --json > build-output.json

      - name: Download APK from EAS
        run: |
          BUILD_URL=$(jq -r '.[0].artifacts.buildUrl' build-output.json)
          echo "Downloading APK from: $BUILD_URL"
          curl -L -o app-release.apk "$BUILD_URL"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app-release.apk
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download built APK artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release
          path: ./release

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          name: "TrackItUp v${{ needs.build.outputs.version }}"
          tag_name: "v${{ needs.build.outputs.version }}"
          body: |
            🚀 **New Android build released**

            - **Version:** v${{ needs.build.outputs.version }}
            - **Commit:** ${{ github.sha }}
            - **Build:** EAS Cloud Build
          files: ./release/app-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.CUSTOM_GITHUB_TOKEN }}
